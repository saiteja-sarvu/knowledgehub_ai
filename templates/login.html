<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in | KnowledgeHub AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-panel" aria-labelledby="login-title">
            <a class="brand" href="/">KnowledgeHub AI</a>
            <div class="auth-heading">
                <h1 id="login-title">Sign in</h1>
                <p>Continue to your document workspace.</p>
            </div>

            {% if error %}
            <div class="alert alert-danger" role="alert">{{ error }}</div>
            {% endif %}

            <form method="post" action="/login" class="auth-form">
                <div>
                    <label for="email" class="form-label">Email address</label>
                    <input id="email" name="email" type="email" class="form-control" value="{{ values.email or '' }}" required autofocus autocomplete="email">
                </div>
                <div>
                    <label for="password" class="form-label">Password</label>
                    <input id="password" name="password" type="password" class="form-control" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary w-100">Sign in</button>
            </form>

            <p class="auth-switch">No account? <a href="/register">Create one</a></p>
        </section>
    </main>
</body>
</html>
