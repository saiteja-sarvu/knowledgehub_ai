<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>RAG AI Chatbot</title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Font Awesome -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    >

    <!-- Custom CSS -->

    <link
        rel="stylesheet"
        href="/static/style.css"
    >

</head>

<body>

    <div class="container py-5">

        <div class="mx-auto app-container">

            <!-- Header -->

            <div class="text-center mb-4">

                <h1 class="fw-bold app-title">

                    <i class="fa-solid fa-robot"></i>

                    RAG AI Chatbot

                </h1>

                <p class="text-muted">

                    Upload PDF documents and ask AI-powered questions.

                </p>

            </div>


            <!-- Upload Card -->

            <div class="card shadow-sm border-0 mb-4">

                <div class="card-body">

                    <div class="d-flex align-items-center mb-3">

                        <i class="fa-solid fa-file-pdf text-danger me-2"></i>

                        <h5 class="mb-0">
                            Upload PDF
                        </h5>

                    </div>

                    <div class="row g-3">

                        <div class="col-md-9">

                            <input
                                type="file"
                                id="pdfFile"
                                class="form-control"
                                accept=".pdf"
                            >

                        </div>

                        <div class="col-md-3 d-grid">

                            <button
                                id="uploadButton"
                                class="btn btn-primary"
                                onclick="uploadPDF()"
                            >

                                <i class="fa-solid fa-upload"></i>

                                Upload

                            </button>

                        </div>

                    </div>

                    <!-- Upload Status -->

                    <div
                        id="uploadStatus"
                        class="mt-3"
                    ></div>

                </div>

            </div>


            <!-- Chat Card -->

            <div class="card shadow-sm border-0 chat-card">

                <div class="card-body d-flex flex-column">

                    <!-- Chat Messages -->

                    <div id="chatBox">

                        <div class="bot-message">

                            Hello! Upload a PDF and ask questions.

                        </div>

                    </div>

                    <!-- Chat Input -->

                    <div class="input-group mt-4">

                        <input
                            type="text"
                            id="questionInput"
                            class="form-control"
                            placeholder="Ask a question..."
                            autocomplete="off"
                        >

                        <button
                            id="askButton"
                            class="btn btn-success"
                            onclick="askQuestion()"
                        >

                            <i class="fa-solid fa-paper-plane"></i>

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Script -->

    <script src="/static/script.js"></script>

</body>

</html>
