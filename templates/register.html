<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create account | KnowledgeHub AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-panel" aria-labelledby="register-title">
            <a class="brand" href="/">KnowledgeHub AI</a>
            <div class="auth-heading">
                <h1 id="register-title">Create account</h1>
                <p>Start a private document workspace.</p>
            </div>

            {% if error %}
            <div class="alert alert-danger" role="alert">{{ error }}</div>
            {% endif %}

            <form method="post" action="/register" class="auth-form">
                <div>
                    <label for="name" class="form-label">Full name</label>
                    <input id="name" name="name" type="text" class="form-control" value="{{ values.name or '' }}" required autofocus autocomplete="name">
                </div>
                <div>
                    <label for="email" class="form-label">Email address</label>
                    <input id="email" name="email" type="email" class="form-control" value="{{ values.email or '' }}" required autocomplete="email">
                </div>
                <div>
                    <label for="password" class="form-label">Password</label>
                    <input id="password" name="password" type="password" class="form-control" minlength="8" required autocomplete="new-password">
                </div>
                <div>
                    <label for="confirm_password" class="form-label">Confirm password</label>
                    <input id="confirm_password" name="confirm_password" type="password" class="form-control" minlength="8" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary w-100">Create account</button>
            </form>

            <p class="auth-switch">Already registered? <a href="/login">Sign in</a></p>
        </section>
    </main>
</body>
</html>
